<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDrop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Home Page -->
    <section id="homePage">
        <h1>QuickDrop</h1>
        <p>Transfer files, images, text, and links between devices</p>

        <button id="receiveBtn">Receive Files</button>
        <button id="uploadToReceiverBtn">Upload Files / Text</button>
    </section>


    <!-- Receive Page -->
    <section id="receivePage" style="display: none;">
        <h2>Receive Files / Text</h2>

        <p>Create a temporary receive session on this device.</p>

        <button id="createReceiveSessionBtn">
            Create Receive Session
        </button>

        <p>Session code:</p>
        <strong id="receiveCode"></strong>

        <p id="receiveExpiryDisplay"></p>

        <div id="receiveQRCode"></div>

        <p id="receiveStatus"></p>

        <button id="checkReceiveSessionBtn" style="display: none;">
            Check for Files / Text
        </button>

        <button id="downloadAllBtn" style="display: none;">
            Download All
        </button>

        <div id="receiveMessageSection" style="display: none;"></div>

        <div id="receiveDownloadSection" style="display: none;"></div>

        <button class="backHomeBtn">Back Home</button>
    </section>


    <!-- Upload Page -->
    <section id="uploadPage" style="display: none;">
        <h2>Upload Files / Text</h2>

        <p>Enter the receiver's session code:</p>
        <input id="uploadSessionCodeInput" placeholder="Receiver code">

        <p>Optional text or link:</p>
        <textarea
            id="uploadMessageInput"
            placeholder="Paste a link, note, or text here"
            rows="4"
        ></textarea>

        <p>Optional file upload:</p>
        <input type="file" id="uploadFileInput" multiple>

        <button id="uploadToSessionBtn">
            Upload to Receiver
        </button>

        <p id="uploadStatus"></p>

        <button class="backHomeBtn">Back Home</button>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
